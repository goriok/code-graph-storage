apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: agentic-tools
spec:
  selector:
    app: neo4j
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
    - name: http
      port: 7474
      targetPort: 7474
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-nodeport
  namespace: agentic-tools
spec:
  selector:
    app: neo4j
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
      nodePort: 30687
    - name: http
      port: 7474
      targetPort: 7474
      nodePort: 30474
  type: NodePort
